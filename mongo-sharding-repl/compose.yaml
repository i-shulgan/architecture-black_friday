name: mongo-sharding-repl

x-shard1: &shard1
  image: mongo:7.0
  command: mongod --shardsvr --replSet shard1Rs --bind_ip_all --port 27017

x-shard2: &shard2
  image: mongo:7.0
  command: mongod --shardsvr --replSet shard2Rs --bind_ip_all --port 27017

services:
  configSrv:
    image: mongo:7.0
    command: mongod --configsvr --replSet configRs --bind_ip_all --port 27017
    volumes:
      - config_data:/data/db

  shard1-1:
    <<: *shard1
    volumes:
      - shard1_1_data:/data/db
  shard1-2:
    <<: *shard1
    volumes:
      - shard1_2_data:/data/db
  shard1-3:
    <<: *shard1
    volumes:
      - shard1_3_data:/data/db

  shard2-1:
    <<: *shard2
    volumes:
      - shard2_1_data:/data/db
  shard2-2:
    <<: *shard2
    volumes:
      - shard2_2_data:/data/db
  shard2-3:
    <<: *shard2
    volumes:
      - shard2_3_data:/data/db

  mongos:
    image: mongo:7.0
    command: mongos --configdb configRs/configSrv:27017 --bind_ip_all --port 27017
    depends_on:
      - configSrv
      - shard1-1
      - shard1-2
      - shard1-3
      - shard2-1
      - shard2-2
      - shard2-3

  pymongo-api:
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
    volumes:
      - ./api_app/app.py:/app/app.py:ro

volumes:
  config_data:
  shard1_1_data:
  shard1_2_data:
  shard1_3_data:
  shard2_1_data:
  shard2_2_data:
  shard2_3_data:
