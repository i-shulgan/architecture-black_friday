name: mongo-sharding

services:
  configSrv:
    image: mongo:7.0
    command: mongod --configsvr --replSet configRs --bind_ip_all --port 27017
    volumes:
      - config_data:/data/db

  shard1-1:
    image: mongo:7.0
    command: mongod --shardsvr --replSet shard1Rs --bind_ip_all --port 27017
    volumes:
      - shard1_data:/data/db

  shard2-1:
    image: mongo:7.0
    command: mongod --shardsvr --replSet shard2Rs --bind_ip_all --port 27017
    volumes:
      - shard2_data:/data/db

  mongos:
    image: mongo:7.0
    command: mongos --configdb configRs/configSrv:27017 --bind_ip_all --port 27017
    depends_on:
      - configSrv
      - shard1-1
      - shard2-1

  pymongo-api:
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
    volumes:
      - ./api_app/app.py:/app/app.py:ro

volumes:
  config_data:
  shard1_data:
  shard2_data:
